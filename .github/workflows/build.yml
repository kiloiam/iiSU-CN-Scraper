name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          pip install flet requests

      - name: Build APK
        run: |
          yes | flet build apk             --project "iiSU CN Scraper"             --org com.iisucn.scraper             --product "iiSU CN Scraper"             --description "Chinese ROM metadata scraper for iiSU frontend"             --android-permissions INTERNET READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE MANAGE_EXTERNAL_STORAGE

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iiSU-CN-Scraper-APK
          path: |
            build/apk/*.apk
          if-no-files-found: warn
