name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet
        run: pip install flet requests openai

      - name: Build APK
        run: |
          yes | flet build apk \
            --project "iiSU CN Scraper" \
            --org com.iisucn.scraper \
            --product "iiSU CN Scraper" \
            --description "Chinese ROM metadata scraper for iiSU frontend"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iiSU-CN-Scraper-APK
          path: build/apk/*.apk
