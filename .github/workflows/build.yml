name: Build APK (Buildozer)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             git zip unzip openjdk-17-jdk             autoconf libtool pkg-config             zlib1g-dev libncurses-dev             cmake libffi-dev libssl-dev             libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install buildozer cython

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iiSU-CN-Scraper-APK
          path: bin/*.apk
